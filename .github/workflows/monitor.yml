name: eGun Monitor

on:
  schedule:
    - cron: "*/10 * * * *"   # alle 10 Minuten
  workflow_dispatch:           # manueller Start jederzeit möglich

permissions:
  contents: write              # damit seen_items.json zurück ins Repo committet werden kann

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Monitor ausführen
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python monitor_cloud.py

      - name: Gesehene Inserate speichern
        run: |
          git config user.name  "eGun Monitor Bot"
          git config user.email "actions@github.com"
          git add seen_items.json
          git diff --cached --quiet || git commit -m "chore: seen_items aktualisiert [skip ci]"
          git push
